<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS - Gestão de Ordens de Serviço</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-gray-200">
        <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
            <h1 class="text-2xl font-bold text-center mb-6 text-blue-600">SaaS OS Login</h1>
            <p class="text-sm text-gray-500 text-center mb-4">Use qualquer usuário/senha para testar o protótipo local.</p>
            <form onsubmit="app.login(event)">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Usuário</label>
                    <input type="text" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Senha</label>
                    <input type="password" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                </div>
                <button type="submit" class="w-full bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline transition duration-200">
                    Entrar
                </button>
            </form>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden min-h-screen flex flex-col">
        <nav class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
            <h1 class="text-xl font-bold">Gestão de O.S.</h1>
            <button onclick="app.logout()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded text-sm font-bold transition duration-200">Sair</button>
        </nav>

        <div class="flex-grow p-4 md:p-8 max-w-6xl mx-auto w-full grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="md:col-span-1 bg-white p-6 rounded-lg shadow-md h-fit">
                <h2 class="text-lg font-bold mb-4 border-b pb-2">Nova Ordem de Serviço</h2>
                <form onsubmit="app.addOS(event)">
                    <div class="mb-3">
                        <label class="block text-sm font-bold mb-1">Cliente</label>
                        <input id="os-client" type="text" required class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm font-bold mb-1">Descrição do Serviço</label>
                        <textarea id="os-desc" required class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm font-bold mb-1">Data</label>
                        <input id="os-date" type="date" required class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-bold mb-1">Valor (R$)</label>
                        <input id="os-value" type="number" step="0.01" required class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded transition duration-200">
                        Salvar O.S.
                    </button>
                </form>
            </div>

            <div class="md:col-span-2 flex flex-col gap-4">
                <div class="bg-white p-4 rounded-lg shadow-md flex flex-wrap justify-between items-center gap-4">
                    <div>
                        <button onclick="app.renderList('all')" class="text-sm bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded">Todas</button>
                        <button onclick="app.renderList('month')" class="text-sm bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded mx-1">Este Mês</button>
                    </div>
                    <button onclick="app.exportPDF()" class="bg-blue-800 hover:bg-blue-900 text-white text-sm font-bold py-2 px-4 rounded flex items-center gap-2">
                        📄 Exportar PDF
                    </button>
                </div>

                <div id="report-area" class="bg-white p-6 rounded-lg shadow-md min-h-[400px]">
                    <h2 id="report-title" class="text-xl font-bold mb-4 text-center">Relatório de Ordens de Serviço</h2>
                    <div id="os-list" class="flex flex-col gap-3">
                        </div>
                    <div class="mt-6 pt-4 border-t text-right font-bold text-lg text-gray-700">
                        Total: R$ <span id="total-value">0.00</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const app = {
            // Tenta carregar dados salvos, se não houver, inicia um array vazio
            data: JSON.parse(localStorage.getItem('saas_os_data')) || [],
            
            init() {
                // Checa o status de login ao carregar a página
                if(localStorage.getItem('saas_logged_in')) {
                    this.showScreen('dashboard-screen');
                    this.renderList();
                } else {
                    this.showScreen('login-screen');
                }
            },

            login(e) {
                e.preventDefault();
                // Sistema simulado de login
                localStorage.setItem('saas_logged_in', 'true');
                this.showScreen('dashboard-screen');
                this.renderList();
            },

            logout() {
                localStorage.removeItem('saas_logged_in');
                this.showScreen('login-screen');
            },

            showScreen(id) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.add('hidden');
                document.getElementById(id).classList.remove('hidden');
            },

            addOS(e) {
                e.preventDefault();
                const client = document.getElementById('os-client').value;
                const desc = document.getElementById('os-desc').value;
                const date = document.getElementById('os-date').value;
                const val = parseFloat(document.getElementById('os-value').value);

                const newOS = { id: Date.now(), client, desc, date, val };
                this.data.push(newOS);
                
                this.save();
                e.target.reset(); // Limpa o formulário
                this.renderList();
            },

            deleteOS(id) {
                if(confirm('Tem certeza que deseja excluir esta O.S.?')) {
                    this.data = this.data.filter(os => os.id !== id);
                    this.save();
                    this.renderList();
                }
            },

            save() {
                localStorage.setItem('saas_os_data', JSON.stringify(this.data));
            },

            renderList(filter = 'all') {
                const listEl = document.getElementById('os-list');
                const titleEl = document.getElementById('report-title');
                let totalValue = 0;
                listEl.innerHTML = '';

                let filteredData = this.data;
                
                // Lógica simples de filtro
                if(filter === 'month') {
                    const now = new Date();
                    filteredData = this.data.filter(os => {
                        // Trata o fuso horário para garantir o mês correto
                        const osDate = new Date(os.date + 'T00:00:00'); 
                        return osDate.getMonth() === now.getMonth() && osDate.getFullYear() === now.getFullYear();
                    });
                    titleEl.innerText = "Relatório de Ordens de Serviço (Este Mês)";
                } else {
                    titleEl.innerText = "Relatório de Ordens de Serviço (Geral)";
                }

                if(filteredData.length === 0) {
                    listEl.innerHTML = '<p class="text-gray-500 text-center py-4">Nenhuma Ordem de Serviço encontrada.</p>';
                } else {
                    filteredData.forEach(os => {
                        totalValue += os.val;
                        // Formata a data para padrão brasileiro
                        const dateObj = new Date(os.date + 'T00:00:00');
                        const formattedDate = dateObj.toLocaleDateString('pt-BR');

                        listEl.innerHTML += `
                            <div class="border border-gray-200 p-4 rounded bg-gray-50 flex justify-between items-center html2pdf__page-break-avoid">
                                <div>
                                    <h3 class="font-bold text-gray-800">${os.client}</h3>
                                    <p class="text-sm text-gray-600 mt-1">${os.desc}</p>
                                    <p class="text-xs text-gray-400 mt-2">Data: ${formattedDate}</p>
                                </div>
                                <div class="text-right flex flex-col justify-between h-full">
                                    <span class="font-bold text-blue-600 mb-2 block">R$ ${os.val.toFixed(2)}</span>
                                    <button onclick="app.deleteOS(${os.id})" class="text-xs text-red-500 hover:underline data-html2canvas-ignore">Excluir</button>
                                </div>
                            </div>
                        `;
                    });
                }
                
                document.getElementById('total-value').innerText = totalValue.toFixed(2);
            },

            exportPDF() {
                // Esconde temporariamente botões de exclusão antes de gerar o PDF
                const deleteButtons = document.querySelectorAll('.data-html2canvas-ignore');
                deleteButtons.forEach(btn => btn.style.display = 'none');

                const element = document.getElementById('report-area');
                const opt = {
                    margin:       0.5,
                    filename:     'relatorio-os.pdf',
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2 },
                    jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
                };
                
                // Gera o PDF e depois restaura os botões
                html2pdf().set(opt).from(element).save().then(() => {
                    deleteButtons.forEach(btn => btn.style.display = 'block');
                });
            }
        };

        // Inicia a aplicação quando o DOM estiver carregado
        window.onload = () => app.init();
    </script>
</body>
</html>
