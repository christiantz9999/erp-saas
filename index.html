<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinControl - Gestão Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow: hidden; }
        .sidebar-active { background-color: #3b82f6 !important; color: white !important; }
        input, select { border: 1px solid #e2e8f0; padding: 0.65rem; border-radius: 0.5rem; outline: none; width: 100%; transition: 0.3s; background: white; font-size: 14px; }
        input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .admin-only { display: none; }
        body.is-admin .admin-only { display: block; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="modal-user" class="modal">
        <div class="bg-white w-full max-w-md rounded-2xl p-8 shadow-2xl">
            <h3 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-user-edit text-blue-600"></i> Editar Usuário</h3>
            <form id="edit-user-form" class="space-y-4">
                <input type="hidden" id="edit-user-id">
                <div><label class="text-xs font-bold text-slate-500">NOME</label><input type="text" id="edit-user-nome"></div>
                <div><label class="text-xs font-bold text-slate-500">E-MAIL</label><input type="email" id="edit-user-email"></div>
                <div><label class="text-xs font-bold text-slate-500">NOVA SENHA (DEIXE EM BRANCO PARA MANTER)</label><input type="password" id="edit-user-pass"></div>
                <div>
                    <label class="text-xs font-bold text-slate-500">NÍVEL DE ACESSO</label>
                    <select id="edit-user-role">
                        <option value="user">Operador (Acesso Limitado)</option>
                        <option value="admin">Administrador (Acesso Total)</option>
                    </select>
                </div>
                <div class="flex gap-2 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 bg-slate-100 py-3 rounded-xl font-bold">Cancelar</button>
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>

    <div id="auth-container" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-8">
            <div class="text-center mb-6">
                <div class="bg-blue-600 w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4"><i class="fas fa-wallet text-white text-xl"></i></div>
                <h1 id="auth-title" class="text-2xl font-bold">FinControl</h1>
            </div>
            <form id="auth-form" class="space-y-4">
                <div id="field-name" class="hidden"><input type="text" id="auth-nome" placeholder="Seu Nome Completo"></div>
                <input type="email" id="auth-email" required placeholder="E-mail">
                <input type="password" id="auth-pass" required placeholder="Senha">
                <button type="submit" id="auth-btn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Entrar</button>
            </form>
            <button onclick="toggleAuthMode()" id="auth-toggle-btn" class="w-full mt-6 text-sm text-blue-600 font-medium">Cadastrar Primeiro Admin</button>
        </div>
    </div>

    <aside id="sidebar" class="sidebar w-64 bg-slate-900 text-slate-300 flex flex-col shrink-0">
        <div class="p-6 text-xl font-extrabold text-white border-b border-slate-800">FinControl</div>
        <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
            <button onclick="showSection('dashboard')" class="nav-btn w-full flex items-center p-3 rounded-lg sidebar-active" id="btn-dashboard"><i class="fas fa-home mr-3"></i> Dashboard</button>
            <button onclick="showSection('clientes')" class="nav-btn w-full flex items-center p-3 rounded-lg" id="btn-clientes"><i class="fas fa-users mr-3"></i> Clientes</button>
            <button onclick="showSection('tecnicos')" class="nav-btn w-full flex items-center p-3 rounded-lg" id="btn-tecnicos"><i class="fas fa-user-cog mr-3"></i> Técnicos</button>
            <button onclick="showSection('vendas')" class="nav-btn w-full flex items-center p-3 rounded-lg" id="btn-vendas"><i class="fas fa-shopping-bag mr-3"></i> Vendas</button>
            <button onclick="showSection('produtos')" class="nav-btn w-full flex items-center p-3 rounded-lg" id="btn-produtos"><i class="fas fa-box mr-3"></i> Produtos</button>
            <button onclick="showSection('financeiro')" class="nav-btn w-full flex items-center p-3 rounded-lg" id="btn-financeiro"><i class="fas fa-file-invoice-dollar mr-3"></i> Financeiro</button>
            
            <div class="admin-only pt-4 border-t border-slate-800">
                <p class="px-3 text-[10px] font-bold text-slate-500 uppercase mb-2">Administração</p>
                <button onclick="showSection('usuarios')" class="nav-btn w-full flex items-center p-3 rounded-lg" id="btn-usuarios"><i class="fas fa-user-shield mr-3"></i> Gestão de Equipe</button>
                <button onclick="showSection('config')" class="nav-btn w-full flex items-center p-3 rounded-lg" id="btn-config"><i class="fas fa-database mr-3"></i> Backup/Reset</button>
            </div>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <div onclick="openUserSelfEdit()" class="cursor-pointer hover:bg-slate-800 p-2 rounded transition mb-2">
                <div id="user-badge" class="text-[10px] font-bold text-blue-400 text-center uppercase tracking-tighter"></div>
                <p class="text-[9px] text-center text-slate-500">Clique para editar perfil</p>
            </div>
            <button onclick="logout()" class="w-full text-red-500 font-bold text-sm">Sair</button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-8">
        <header class="flex justify-between items-center mb-8">
            <h1 id="page-title" class="text-2xl font-black text-slate-800 uppercase">Dashboard</h1>
        </header>

        <section id="sec-dashboard" class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="bg-white p-6 rounded-2xl border shadow-sm"><p class="text-slate-400 text-xs font-bold">RECEITA</p><h2 id="dash-saldo" class="text-2xl font-black text-green-600">R$ 0,00</h2></div>
            <div class="bg-white p-6 rounded-2xl border shadow-sm"><p class="text-slate-400 text-xs font-bold">CLIENTES</p><h2 id="dash-clientes" class="text-2xl font-black text-blue-600">0</h2></div>
        </section>

        <section id="sec-clientes" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-2xl border shadow-sm grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="cli-nome" placeholder="Nome"><input type="text" id="cli-cpf" placeholder="CPF"><input type="text" id="cli-tel" placeholder="Telefone">
                <input type="text" id="cli-end" placeholder="Endereço" class="md:col-span-2"><button onclick="registrarCliente()" class="bg-blue-600 text-white font-bold rounded-lg">Salvar</button>
            </div>
            <div class="bg-white rounded-2xl border shadow-sm overflow-hidden"><table class="w-full text-left text-sm"><thead class="bg-slate-50"><tr><th class="p-4">Nome</th><th class="p-4">CPF</th><th class="p-4">Endereço</th><th class="p-4 text-right">Ação</th></tr></thead><tbody id="lista-clientes" class="divide-y"></tbody></table></div>
        </section>

        <section id="sec-vendas" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-2xl border shadow-sm grid grid-cols-1 md:grid-cols-4 gap-4">
                <select id="venda-cliente-select"></select><select id="venda-produto-select"></select><select id="venda-pagamento"><option value="PIX">PIX</option><option value="Dinheiro">Dinheiro</option></select><button onclick="registrarVenda()" class="bg-emerald-600 text-white font-bold rounded-lg py-3">Vender</button>
            </div>
            <div class="bg-white rounded-2xl border shadow-sm overflow-hidden"><table class="w-full text-left text-sm"><thead class="bg-slate-50"><tr><th class="p-4">Data</th><th class="p-4">Cliente</th><th class="p-4">Item</th><th class="p-4 text-right">Valor</th></tr></thead><tbody id="lista-vendas" class="divide-y"></tbody></table></div>
        </section>

        <section id="sec-usuarios" class="hidden space-y-6">
            <div class="bg-white rounded-2xl border shadow-sm overflow-hidden">
                <div class="p-6 border-b flex justify-between items-center">
                    <h3 class="font-bold text-slate-700">Equipe Cadastrada</h3>
                    <p class="text-xs text-slate-400 italic">Administradores podem editar qualquer usuário.</p>
                </div>
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="p-4">Usuário</th>
                            <th class="p-4">E-mail</th>
                            <th class="p-4">Nível</th>
                            <th class="p-4 text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista-usuarios" class="divide-y"></tbody>
                </table>
            </div>
        </section>

        <section id="sec-tecnicos" class="hidden"><div id="lista-tecnicos"></div></section>
        <section id="sec-produtos" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-2xl border shadow-sm flex gap-4"><input type="text" id="prod-nome" placeholder="Nome"><input type="number" id="prod-preco" placeholder="R$"><button onclick="adicionarProduto()" class="bg-slate-800 text-white px-8 rounded-lg">Salvar</button></div>
            <div class="bg-white rounded-2xl border shadow-sm"><table class="w-full text-left text-sm"><tbody id="lista-produtos" class="divide-y"></tbody></table></div>
        </section>
        <section id="sec-financeiro" class="hidden"><div id="fin-total" class="text-3xl font-black mb-4"></div><div class="bg-white rounded-2xl border shadow-sm"><table class="w-full text-left text-sm"><tbody id="lista-financeiro" class="divide-y"></tbody></table></div></section>
        <section id="sec-config" class="hidden space-y-6">
            <button onclick="downloadBackup()" class="bg-slate-900 text-white p-4 rounded-xl w-full">Baixar Backup</button>
            <input type="file" id="importFile" class="mt-4"><button onclick="importBackup()" class="bg-blue-600 text-white p-4 rounded-xl w-full mt-2">Importar Backup</button>
            <button onclick="resetSystem()" class="bg-red-50 text-red-600 p-4 rounded-xl w-full mt-8 border border-red-200">Zerar Sistema</button>
        </section>

    </main>

    <script>
        // --- DATABASE ---
        const DB_KEY = 'fincontrol_v14_final';
        let db = JSON.parse(localStorage.getItem(DB_KEY)) || {
            users: [], clientes: [], tecnicos: [], produtos: [], vendas: [], financeiro: [], os: []
        };
        let currentUser = JSON.parse(sessionStorage.getItem('erp_session')) || null;

        const save = () => { localStorage.setItem(DB_KEY, JSON.stringify(db)); renderAll(); };

        // --- AUTH ---
        function checkFirstRun() {
            const btn = document.getElementById('auth-toggle-btn');
            if (db.users.length > 0) btn.classList.add('hidden');
        }

        let authMode = 'login';
        function toggleAuthMode() {
            authMode = authMode === 'login' ? 'register' : 'login';
            document.getElementById('auth-title').innerText = authMode === 'login' ? 'FinControl' : 'Novo Admin';
            document.getElementById('field-name').classList.toggle('hidden');
        }

        document.getElementById('auth-form').onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;

            if (authMode === 'register') {
                db.users.push({ id: Date.now(), nome: document.getElementById('auth-nome').value, email, pass, role: 'admin' });
                save(); location.reload();
            } else {
                const user = db.users.find(u => u.email === email && u.pass === pass);
                if (user) { sessionStorage.setItem('erp_session', JSON.stringify(user)); location.reload(); }
                else alert("Acesso inválido");
            }
        };

        function logout() { sessionStorage.clear(); location.reload(); }

        // --- GESTÃO DE USUÁRIOS (FUNÇÕES DE EDIÇÃO) ---
        function openEditUser(id) {
            const user = db.users.find(u => u.id === id);
            document.getElementById('edit-user-id').value = user.id;
            document.getElementById('edit-user-nome').value = user.nome;
            document.getElementById('edit-user-email').value = user.email;
            document.getElementById('edit-user-role').value = user.role;
            document.getElementById('edit-user-pass').value = '';
            document.getElementById('modal-user').classList.add('active');
        }

        function openUserSelfEdit() {
            openEditUser(currentUser.id);
        }

        function closeModal() { document.getElementById('modal-user').classList.remove('active'); }

        document.getElementById('edit-user-form').onsubmit = (e) => {
            e.preventDefault();
            const id = parseInt(document.getElementById('edit-user-id').value);
            const userIdx = db.users.findIndex(u => u.id === id);
            
            db.users[userIdx].nome = document.getElementById('edit-user-nome').value;
            db.users[userIdx].email = document.getElementById('edit-user-email').value;
            db.users[userIdx].role = document.getElementById('edit-user-role').value;
            
            const newPass = document.getElementById('edit-user-pass').value;
            if(newPass) db.users[userIdx].pass = newPass;

            // Se o usuário editado for o próprio logado, atualiza a sessão
            if(id === currentUser.id) {
                sessionStorage.setItem('erp_session', JSON.stringify(db.users[userIdx]));
            }

            save();
            closeModal();
            alert("Dados atualizados!");
            if(id === currentUser.id) location.reload();
        };

        function deleteUser(id) {
            if(id === currentUser.id) return alert("Você não pode excluir sua própria conta enquanto está logado.");
            if(confirm("Deseja realmente remover este usuário?")) {
                db.users = db.users.filter(u => u.id !== id);
                save();
            }
        }

        // --- CORE ---
        function registrarCliente() {
            db.clientes.push({ id: Date.now(), nome: document.getElementById('cli-nome').value, cpf: document.getElementById('cli-cpf').value, tel: document.getElementById('cli-tel').value, end: document.getElementById('cli-end').value });
            save(); alert("Cliente salvo!");
        }

        function registrarVenda() {
            const pIdx = document.getElementById('venda-produto-select').value;
            const cNome = document.getElementById('venda-cliente-select').value;
            if(pIdx==="" || !cNome) return;
            const p = db.produtos[pIdx];
            const data = new Date().toLocaleString();
            db.vendas.push({ data, cliente: cNome, produto: p.nome, valor: p.preco, pag: document.getElementById('venda-pagamento').value });
            db.financeiro.push({ data, desc: `Venda: ${p.nome} (${cNome})`, valor: p.preco });
            save();
        }

        function adicionarProduto() {
            db.produtos.push({ nome: document.getElementById('prod-nome').value, preco: parseFloat(document.getElementById('prod-preco').value) });
            save();
        }

        // --- BACKUP ---
        function downloadBackup() {
            const data = JSON.stringify(db, null, 2);
            const blob = new Blob([data], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'backup.json'; a.click();
        }

        function importBackup() {
            const file = document.getElementById('importFile').files[0];
            const reader = new FileReader();
            reader.onload = (e) => { db = JSON.parse(e.target.result); save(); location.reload(); };
            reader.readAsText(file);
        }

        function resetSystem() { if(confirm("Cuidado! Isso apaga TUDO.")) { localStorage.clear(); location.reload(); } }

        // --- RENDER ---
        function renderAll() {
            if(currentUser?.role === 'admin') document.body.classList.add('is-admin');
            document.getElementById('user-badge').innerText = currentUser ? `${currentUser.nome} (${currentUser.role.toUpperCase()})` : '';

            const saldo = db.financeiro.reduce((a,b) => a + (b.valor||0), 0);
            document.getElementById('dash-saldo').innerText = `R$ ${saldo.toFixed(2)}`;
            document.getElementById('dash-clientes').innerText = db.clientes.length;
            document.getElementById('fin-total').innerText = `Total em Caixa: R$ ${saldo.toFixed(2)}`;

            // Selects
            const cliOpt = '<option value="">Cliente...</option>' + db.clientes.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
            document.getElementById('venda-cliente-select').innerHTML = cliOpt;
            document.getElementById('venda-produto-select').innerHTML = '<option value="">Produto...</option>' + db.produtos.map((p,i) => `<option value="${i}">${p.nome}</option>`).join('');

            // Tabela Usuários (COM EDIÇÃO)
            document.getElementById('lista-usuarios').innerHTML = db.users.map(u => `
                <tr>
                    <td class="p-4 font-bold text-slate-800">${u.nome} ${u.id === currentUser.id ? '<span class="text-[10px] bg-blue-100 text-blue-600 px-2 rounded-full">VOCÊ</span>' : ''}</td>
                    <td class="p-4 text-slate-500">${u.email}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded text-[10px] font-bold ${u.role==='admin'?'bg-purple-100 text-purple-600':'bg-slate-100 text-slate-600'} uppercase">${u.role}</span></td>
                    <td class="p-4 text-center flex justify-center gap-3">
                        <button onclick="openEditUser(${u.id})" class="text-blue-500 hover:text-blue-700" title="Editar Usuário"><i class="fas fa-edit"></i></button>
                        ${u.id !== currentUser.id ? `<button onclick="deleteUser(${u.id})" class="text-red-400 hover:text-red-600" title="Excluir"><i class="fas fa-trash"></i></button>` : ''}
                    </td>
                </tr>
            `).join('');

            document.getElementById('lista-clientes').innerHTML = db.clientes.map(c => `<tr><td class="p-4 font-bold">${c.nome}</td><td class="p-4">${c.cpf}</td><td class="p-4 text-xs">${c.end}</td><td class="p-4 text-right"><button onclick="db.clientes=db.clientes.filter(x=>x.id!==${c.id});save()" class="text-red-400">Remover</button></td></tr>`).join('');
            document.getElementById('lista-vendas').innerHTML = db.vendas.slice().reverse().map(v => `<tr><td class="p-4 text-[10px]">${v.data}</td><td class="p-4 font-bold">${v.cliente}</td><td class="p-4 text-slate-600">${v.produto}</td><td class="p-4 text-right font-black">R$ ${v.valor.toFixed(2)}</td></tr>`).join('');
            document.getElementById('lista-produtos').innerHTML = db.produtos.map((p,i) => `<tr><td class="p-4 font-bold">${p.nome}</td><td class="p-4">R$ ${p.preco}</td><td class="p-4 text-right"><button onclick="db.produtos.splice(${i},1);save()">❌</button></td></tr>`).join('');
            document.getElementById('lista-financeiro').innerHTML = db.financeiro.slice().reverse().map(f => `<tr><td class="p-4 text-xs">${f.data}</td><td class="p-4 font-medium">${f.desc}</td><td class="p-4 text-green-600 font-bold text-right">R$ ${f.valor.toFixed(2)}</td></tr>`).join('');
        }

        function showSection(id) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('sidebar-active'));
            document.getElementById('btn-' + id).classList.add('sidebar-active');
            document.getElementById('page-title').innerText = id;
        }

        checkFirstRun();
        if(currentUser) { document.getElementById('auth-container').classList.add('hidden'); renderAll(); }
    </script>
</body>
</html>
