<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinControl - ERP Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow: hidden; }
        .sidebar-active { background-color: #3b82f6 !important; color: white !important; }
        input, select, textarea { border: 1px solid #e2e8f0; padding: 0.65rem; border-radius: 0.5rem; outline: none; width: 100%; transition: 0.3s; background: white; font-size: 14px; }
        input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .admin-only { display: none; }
        body.is-admin .admin-only { display: block; }
        @media (max-width: 768px) {
            .sidebar { position: fixed; z-index: 50; transform: translateX(-100%); transition: 0.3s; height: 100%; }
            .sidebar.open { transform: translateX(0); }
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="auth-container" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-8">
            <div class="text-center mb-6">
                <div class="bg-blue-600 w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl shadow-blue-500/30">
                    <i class="fas fa-wallet text-white text-xl"></i>
                </div>
                <h1 id="auth-title" class="text-2xl font-bold">FinControl</h1>
            </div>
            <form onsubmit="handleAuth(e)" id="auth-form" class="space-y-4">
                <div id="field-name" class="hidden"><input type="text" id="auth-nome" placeholder="Nome Completo"></div>
                <input type="email" id="auth-email" required placeholder="E-mail">
                <input type="password" id="auth-pass" required placeholder="Senha">
                <button type="submit" id="auth-btn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">Entrar no Sistema</button>
            </form>
            <button onclick="toggleAuthMode()" id="auth-toggle-text" class="w-full mt-6 text-sm text-blue-600 font-medium">Criar conta administrativa</button>
        </div>
    </div>

    <aside id="sidebar" class="sidebar w-64 bg-slate-900 text-slate-300 flex flex-col shadow-xl shrink-0">
        <div class="p-6 text-xl font-extrabold text-white border-b border-slate-800 flex items-center gap-3">
            <i class="fas fa-chart-line text-blue-500"></i> FinControl
        </div>
        <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
            <button onclick="showSection('dashboard')" class="nav-btn w-full flex items-center p-3 rounded-lg sidebar-active" id="btn-dashboard"><i class="fas fa-home mr-3"></i> Dashboard</button>
            <button onclick="showSection('clientes')" class="nav-btn w-full flex items-center p-3 rounded-lg" id="btn-clientes"><i class="fas fa-users mr-3"></i> Clientes</button>
            <button onclick="showSection('tecnicos')" class="nav-btn w-full flex items-center p-3 rounded-lg" id="btn-tecnicos"><i class="fas fa-user-cog mr-3"></i> Técnicos</button>
            <button onclick="showSection('os')" class="nav-btn w-full flex items-center p-3 rounded-lg" id="btn-os"><i class="fas fa-tools mr-3"></i> Ordens de Serviço</button>
            <button onclick="showSection('vendas')" class="nav-btn w-full flex items-center p-3 rounded-lg" id="btn-vendas"><i class="fas fa-shopping-bag mr-3"></i> Vendas</button>
            <button onclick="showSection('produtos')" class="nav-btn w-full flex items-center p-3 rounded-lg" id="btn-produtos"><i class="fas fa-box mr-3"></i> Produtos/Serviços</button>
            <button onclick="showSection('financeiro')" class="nav-btn w-full flex items-center p-3 rounded-lg" id="btn-financeiro"><i class="fas fa-file-invoice-dollar mr-3"></i> Financeiro</button>
            
            <div class="admin-only pt-4 border-t border-slate-800">
                <p class="px-3 text-[10px] font-bold text-slate-500 uppercase mb-2">Administração</p>
                <button onclick="showSection('usuarios')" class="nav-btn w-full flex items-center p-3 rounded-lg" id="btn-usuarios"><i class="fas fa-user-shield mr-3"></i> Usuários</button>
                <button onclick="showSection('config')" class="nav-btn w-full flex items-center p-3 rounded-lg" id="btn-config"><i class="fas fa-database mr-3"></i> Configurações</button>
            </div>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <div id="user-badge" class="mb-3 px-2 py-1 bg-slate-800 rounded text-[10px] font-bold text-blue-400 text-center uppercase"></div>
            <button onclick="logout()" class="w-full text-red-500 font-bold text-sm">Sair do ERP</button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 md:p-8">
        <header class="flex justify-between items-center mb-8">
            <h1 id="page-title" class="text-2xl font-black text-slate-800 tracking-tight">Dashboard</h1>
            <button onclick="document.getElementById('sidebar').classList.toggle('open')" class="md:hidden p-2 bg-white rounded-lg shadow-sm"><i class="fas fa-bars"></i></button>
        </header>

        <section id="sec-dashboard" class="space-y-6">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="bg-white p-6 rounded-2xl border shadow-sm"><p class="text-slate-400 text-xs font-bold uppercase">Receita Bruta</p><h2 id="dash-saldo" class="text-2xl font-black text-green-600">R$ 0,00</h2></div>
                <div class="bg-white p-6 rounded-2xl border shadow-sm"><p class="text-slate-400 text-xs font-bold uppercase">Clientes Base</p><h2 id="dash-clientes" class="text-2xl font-black text-blue-600">0</h2></div>
                <div class="bg-white p-6 rounded-2xl border shadow-sm"><p class="text-slate-400 text-xs font-bold uppercase">O.S. em Aberto</p><h2 id="dash-os" class="text-2xl font-black text-orange-500">0</h2></div>
                <div class="bg-white p-6 rounded-2xl border shadow-sm"><p class="text-slate-400 text-xs font-bold uppercase">Total Vendas</p><h2 id="dash-vendas" class="text-2xl font-black text-slate-800">0</h2></div>
            </div>
            <div class="bg-white p-6 rounded-2xl border shadow-sm"><canvas id="mainChart" height="100"></canvas></div>
        </section>

        <section id="sec-vendas" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-2xl border shadow-sm">
                <h3 class="font-bold mb-4 text-slate-700">Registrar Venda Direta</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <select id="venda-cliente-select"><option value="">Selecionar Cliente</option></select>
                    <select id="venda-produto-select"><option value="">Selecionar Item</option></select>
                    <select id="venda-pagamento">
                        <option value="PIX">PIX</option>
                        <option value="Dinheiro">Dinheiro</option>
                        <option value="Cartão de Crédito">Cartão de Crédito</option>
                    </select>
                    <button onclick="registrarVenda()" class="bg-emerald-600 text-white font-bold rounded-lg py-3 hover:bg-emerald-700 transition">Confirmar Venda</button>
                </div>
            </div>
            <div class="bg-white rounded-2xl border shadow-sm overflow-x-auto">
                <table class="w-full text-left text-sm min-w-[700px]">
                    <thead class="bg-slate-50 border-b">
                        <tr>
                            <th class="p-4">Data</th>
                            <th class="p-4">Cliente</th>
                            <th class="p-4">Produto/Serviço</th>
                            <th class="p-4">Forma Pagto.</th>
                            <th class="p-4 text-right">Valor</th>
                        </tr>
                    </thead>
                    <tbody id="lista-vendas" class="divide-y"></tbody>
                </table>
            </div>
        </section>

        <section id="sec-clientes" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-2xl border shadow-sm">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <input type="text" id="cli-nome" placeholder="Nome Completo">
                    <input type="text" id="cli-tel" placeholder="Telefone">
                    <input type="email" id="cli-email" placeholder="E-mail">
                    <button onclick="registrarCliente()" class="bg-blue-600 text-white font-bold rounded-lg py-3 hover:bg-blue-700">Salvar Cliente</button>
                </div>
            </div>
            <div class="bg-white rounded-2xl border shadow-sm overflow-hidden"><table class="w-full text-left text-sm"><tbody id="lista-clientes" class="divide-y"></tbody></table></div>
        </section>

        <section id="sec-tecnicos" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-2xl border shadow-sm">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="tec-nome" placeholder="Nome do Técnico">
                    <input type="text" id="tec-cargo" placeholder="Especialidade">
                    <button onclick="registrarTecnico()" class="bg-blue-600 text-white font-bold rounded-lg py-3">Cadastrar Técnico</button>
                </div>
            </div>
            <div class="bg-white rounded-2xl border shadow-sm overflow-hidden"><table class="w-full text-left text-sm"><tbody id="lista-tecnicos" class="divide-y"></tbody></table></div>
        </section>

        <section id="sec-os" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-2xl border shadow-sm">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <select id="os-cliente-select"><option value="">Cliente</option></select>
                    <select id="os-tecnico-select"><option value="">Técnico Responsável</option></select>
                    <input type="text" id="os-servico" placeholder="Descrição do Serviço">
                    <select id="os-status">
                        <option value="Aguardando">Aguardando</option>
                        <option value="Concluído">Concluído</option>
                    </select>
                    <button onclick="registrarOS()" class="bg-blue-600 text-white font-bold py-3 rounded-lg lg:col-span-2">Abrir O.S.</button>
                </div>
            </div>
            <div class="bg-white rounded-2xl border shadow-sm overflow-hidden"><table class="w-full text-left text-sm"><tbody id="lista-os" class="divide-y"></tbody></table></div>
        </section>

        <section id="sec-financeiro" class="hidden space-y-6">
            <div class="bg-slate-900 p-12 rounded-3xl text-center text-white shadow-xl"><h1 id="fin-total" class="text-5xl font-black">R$ 0,00</h1></div>
            <div class="bg-white rounded-2xl border shadow-sm overflow-hidden"><table class="w-full text-left text-sm"><tbody id="lista-financeiro" class="divide-y"></tbody></table></div>
        </section>

        <section id="sec-usuarios" class="hidden space-y-6">
            <div class="bg-white rounded-2xl border shadow-sm overflow-hidden"><table class="w-full text-left text-sm"><thead class="bg-slate-50 border-b"><tr><th class="p-4">Usuário</th><th class="p-4">Nível</th><th class="p-4 text-center">Ação</th></tr></thead><tbody id="lista-usuarios" class="divide-y"></tbody></table></div>
        </section>

        <section id="sec-config" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-8 rounded-2xl border shadow-sm">
                    <h4 class="font-bold mb-4">Exportar Backup</h4>
                    <button onclick="downloadBackup()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold">Salvar JSON</button>
                </div>
                <div class="bg-white p-8 rounded-2xl border shadow-sm">
                    <h4 class="font-bold mb-4 text-blue-600">Restaurar Backup</h4>
                    <input type="file" id="importFile" accept=".json" class="text-xs mb-4 block w-full">
                    <button onclick="importBackup()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Importar Dados</button>
                </div>
                <div class="bg-white p-8 rounded-2xl border shadow-sm md:col-span-2">
                    <button onclick="resetSystem()" class="w-full bg-red-50 text-red-600 py-3 rounded-xl font-bold border border-red-100">Resetar Todo o FinControl</button>
                </div>
            </div>
        </section>

        <section id="sec-produtos" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-2xl border shadow-sm"><div class="grid grid-cols-1 md:grid-cols-3 gap-4"><input type="text" id="prod-nome" placeholder="Item/Serviço"><input type="number" id="prod-preco" placeholder="Preço R$"><button onclick="adicionarProduto()" class="bg-slate-800 text-white font-bold rounded-lg">Cadastrar</button></div></div>
            <div class="bg-white rounded-2xl border shadow-sm overflow-hidden"><table class="w-full text-left text-sm"><tbody id="lista-produtos" class="divide-y"></tbody></table></div>
        </section>
    </main>

    <script>
        const DB_KEY = 'fincontrol_v11';
        let db = JSON.parse(localStorage.getItem(DB_KEY)) || {
            users: [], clientes: [], tecnicos: [], produtos: [], vendas: [], financeiro: [], os: []
        };
        let currentUser = JSON.parse(sessionStorage.getItem('erp_session')) || null;

        const save = () => { localStorage.setItem(DB_KEY, JSON.stringify(db)); renderAll(); };

        // --- AUTH ---
        let authMode = 'login';
        function toggleAuthMode() {
            authMode = authMode === 'login' ? 'register' : 'login';
            document.getElementById('auth-title').innerText = authMode === 'login' ? 'FinControl' : 'Novo Administrador';
            document.getElementById('field-name').classList.toggle('hidden');
        }

        function handleAuth(event) {
            if(event) event.preventDefault();
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;

            if(authMode === 'register') {
                const isAdmin = db.users.length === 0;
                db.users.push({ id: Date.now(), nome: document.getElementById('auth-nome').value, email, pass, role: isAdmin ? 'admin' : 'user' });
                save(); alert("Conta criada!"); toggleAuthMode();
            } else {
                const user = db.users.find(u => u.email === email && u.pass === pass);
                if(user) { sessionStorage.setItem('erp_session', JSON.stringify(user)); location.reload(); }
                else alert("Acesso negado.");
            }
        }
        document.getElementById('auth-form').onsubmit = handleAuth;
        function logout() { sessionStorage.clear(); location.reload(); }

        // --- VENDAS ---
        function registrarVenda() {
            const pIdx = document.getElementById('venda-produto-select').value;
            const cNome = document.getElementById('venda-cliente-select').value;
            const fPag = document.getElementById('venda-pagamento').value;
            if(pIdx === "" || !cNome) return alert("Selecione cliente e produto!");

            const p = db.produtos[pIdx];
            const data = new Date().toLocaleString('pt-BR');
            const venda = { data, cliente: cNome, produto: p.nome, valor: p.preco, pag: fPag };
            
            db.vendas.push(venda);
            db.financeiro.push({ data, desc: `Venda: ${p.nome} (${cNome})`, valor: p.preco, pag: fPag });
            save();
            alert("Venda realizada!");
        }

        // --- TÉCNICOS ---
        function registrarTecnico() {
            const nome = document.getElementById('tec-nome').value;
            if(!nome) return;
            db.tecnicos.push({ id: Date.now(), nome, cargo: document.getElementById('tec-cargo').value });
            save();
            document.getElementById('tec-nome').value = '';
        }

        // --- BACKUP ---
        function downloadBackup() {
            const blob = new Blob([JSON.stringify(db, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'fincontrol_backup.json'; a.click();
        }

        function importBackup() {
            const file = document.getElementById('importFile').files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if(data.users) { db = data; save(); location.reload(); }
                } catch(err) { alert("Arquivo inválido."); }
            };
            reader.readAsText(file);
        }

        // --- RENDER ---
        function renderAll() {
            if(currentUser?.role === 'admin') document.body.classList.add('is-admin');
            document.getElementById('user-badge').innerText = currentUser ? `${currentUser.nome} (${currentUser.role})` : '';

            const saldo = db.financeiro.reduce((a, b) => a + b.valor, 0);
            document.getElementById('dash-saldo').innerText = `R$ ${saldo.toFixed(2)}`;
            document.getElementById('dash-clientes').innerText = db.clientes.length;
            document.getElementById('dash-os').innerText = db.os.filter(o => o.status !== 'Concluído').length;
            document.getElementById('dash-vendas').innerText = db.vendas.length;
            document.getElementById('fin-total').innerText = `R$ ${saldo.toFixed(2)}`;

            // Selects
            const cliOpt = '<option value="">Selecionar Cliente...</option>' + db.clientes.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
            document.getElementById('venda-cliente-select').innerHTML = cliOpt;
            document.getElementById('os-cliente-select').innerHTML = cliOpt;
            document.getElementById('os-tecnico-select').innerHTML = '<option value="">Selecionar Técnico...</option>' + db.tecnicos.map(t => `<option value="${t.nome}">${t.nome}</option>`).join('');
            document.getElementById('venda-produto-select').innerHTML = '<option value="">Selecionar Item...</option>' + db.produtos.map((p,i) => `<option value="${i}">${p.nome} (R$ ${p.preco})</option>`).join('');

            // Tabela Vendas (Solicitada)
            document.getElementById('lista-vendas').innerHTML = db.vendas.slice().reverse().map(v => `
                <tr>
                    <td class="p-4 text-xs font-medium text-slate-500">${v.data}</td>
                    <td class="p-4 font-bold text-slate-800">${v.cliente}</td>
                    <td class="p-4 text-slate-600">${v.produto}</td>
                    <td class="p-4"><span class="px-2 py-1 bg-blue-50 text-blue-600 rounded text-[10px] font-bold uppercase">${v.pag}</span></td>
                    <td class="p-4 text-right font-black text-slate-900">R$ ${v.valor.toFixed(2)}</td>
                </tr>
            `).join('');

            // Outras Tabelas
            document.getElementById('lista-tecnicos').innerHTML = db.tecnicos.map(t => `<tr><td class="p-4 font-bold">${t.nome}</td><td class="p-4">${t.cargo}</td><td class="p-4 text-center">${currentUser?.role==='admin'?`<button onclick="db.tecnicos=db.tecnicos.filter(x=>x.id!==${t.id});save()" class="text-red-500"><i class="fas fa-trash"></i></button>`:'--'}</td></tr>`).join('');
            document.getElementById('lista-clientes').innerHTML = db.clientes.map(c => `<tr><td class="p-4 font-bold">${c.nome}</td><td class="p-4">${c.tel}</td><td class="p-4 text-right">${currentUser?.role==='admin'?`<button onclick="db.clientes=db.clientes.filter(x=>x.id!==${c.id});save()" class="text-red-400">Excluir</button>`:'--'}</td></tr>`).join('');
            document.getElementById('lista-usuarios').innerHTML = db.users.map(u => `<tr><td class="p-4 font-bold">${u.nome}</td><td class="p-4 uppercase text-xs font-bold">${u.role}</td><td class="p-4 text-center"><button onclick="deleteUser(${u.id})" class="text-red-500">Remover</button></td></tr>`).join('');
            document.getElementById('lista-produtos').innerHTML = db.produtos.map((p,i) => `<tr><td class="p-4 font-bold">${p.nome}</td><td class="p-4 text-right font-bold">R$ ${p.preco.toFixed(2)}</td><td class="p-4 text-right">${currentUser?.role==='admin'?`<button onclick="db.produtos.splice(${i},1);save()">❌</button>`:''}</td></tr>`).join('');
            document.getElementById('lista-os').innerHTML = db.os.slice().reverse().map(o => `<tr><td class="p-4 text-xs">${o.data}</td><td class="p-4 font-bold">${o.cliente}</td><td class="p-4">${o.tecnico}</td><td class="p-4"><span class="font-bold text-orange-600">${o.status}</span></td><td class="p-4 text-center"><button onclick="exportOS(${o.id})"><i class="fas fa-file-pdf"></i></button></td></tr>`).join('');
            document.getElementById('lista-financeiro').innerHTML = db.financeiro.slice().reverse().map(f => `<tr><td class="p-4 text-xs">${f.data}</td><td class="p-4 font-medium">${f.desc}</td><td class="p-4 text-green-600 font-black text-right">R$ ${f.valor.toFixed(2)}</td></tr>`).join('');
        }

        // Funções de Interface
        function showSection(id) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('sidebar-active'));
            document.getElementById('btn-' + id).classList.add('sidebar-active');
            document.getElementById('page-title').innerText = id.charAt(0).toUpperCase() + id.slice(1);
            document.getElementById('sidebar').classList.remove('open');
        }

        function registrarCliente() {
            db.clientes.push({ id: Date.now(), nome: document.getElementById('cli-nome').value, tel: document.getElementById('cli-tel').value });
            save(); document.getElementById('cli-nome').value = '';
        }

        function registrarOS() {
            db.os.push({ id: Date.now(), data: new Date().toLocaleDateString(), cliente: document.getElementById('os-cliente-select').value, tecnico: document.getElementById('os-tecnico-select').value, status: document.getElementById('os-status').value });
            save();
        }

        function adicionarProduto() {
            db.produtos.push({ nome: document.getElementById('prod-nome').value, preco: parseFloat(document.getElementById('prod-preco').value) });
            save();
        }

        function deleteUser(id) { if(id !== currentUser.id && confirm("Remover usuário?")) { db.users = db.users.filter(u => u.id !== id); save(); } }
        function resetSystem() { if(confirm("APAGAR TUDO?")) { localStorage.removeItem(DB_KEY); location.reload(); } }

        if(currentUser) { document.getElementById('auth-container').classList.add('hidden'); renderAll(); }
    </script>
</body>
</html>
